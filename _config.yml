title: 难易的技术博客
description: 记录一些技术学习实践的笔记
lang: zh-CN
timezone: Asia/Shanghai

permalink: /:year/:month/:day/:title/

collections:
  posts:
    output: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed

# Minimal Mistakes theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"
search: true

# Site author
author:
  name: HardySimpson
  bio: "技术实践者"
  location: "Shanghai"

# Defaults
defaults:
  - _posts:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
