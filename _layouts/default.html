<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
  </title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </h1>
      {% if site.description %}
      <p class="site-subtitle">{{ site.description }}</p>
      {% endif %}
      <nav class="nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/about.html' | relative_url }}">关于</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>托管于 <a href="https://pages.github.com/" target="_blank" rel="noreferrer">GitHub Pages</a></p>
    </div>
  </footer>
</body>
</html>
