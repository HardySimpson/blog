<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    .post-header { margin-bottom: 2em; }
    .post-title { font-size: 2em; margin-bottom: 0.5em; }
    .post-date { color: #666; font-size: 0.9em; }
    .post-content h2 { margin-top: 1.5em; }
    .post-content h3 { margin-top: 1.2em; }
    .post-content pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
    .post-content code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .post-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }
    .post-content th, .post-content td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }
    .post-content th { background: #f6f8fa; }

    /* Series navigation */
    .series-nav {
      background: #f8f9fa;
      border-left: 4px solid #0066cc;
      padding: 12px 16px;
      margin: 24px 0;
      font-size: 14px;
    }
    .series-label {
      font-weight: bold;
      color: #555;
      display: block;
      margin-bottom: 8px;
    }
    .series-links {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .series-links .nav {
      color: #0066cc;
      text-decoration: none;
    }
    .series-links .nav:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <article class="post">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</body>
</html>
