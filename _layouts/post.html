---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<div class="back-home">
  <a href="{{ "/" | relative_url }}">← 返回主页</a>
</div>

<style>
  .post-header { margin-bottom: 2em; }
  .post-title { font-size: 2em; margin-bottom: 0.5em; }
  .post-date { color: #666; font-size: 0.9em; }
  .post-content h2 { margin-top: 1.5em; }
  .post-content h3 { margin-top: 1.2em; }
  .post-content pre {
    background: #f6f8fa;
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
  }
  .post-content code {
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .post-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }
  .post-content th, .post-content td {
    border: 1px solid #ddd;
    padding: 8px 12px;
    text-align: left;
  }
  .post-content th { background: #f6f8fa; }

  /* Series navigation */
  .series-nav {
    background: #f8f9fa;
    border-left: 4px solid #0066cc;
    padding: 12px 16px;
    margin: 24px 0;
    font-size: 14px;
  }
  .series-label {
    font-weight: bold;
    color: #555;
    display: block;
    margin-bottom: 8px;
  }
  .series-links {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .series-links .nav {
    color: #0066cc;
    text-decoration: none;
  }
  .series-links .nav:hover {
    text-decoration: underline;
  }
  .back-home {
    margin-top: 3em;
    padding-top: 1.5em;
    border-top: 1px solid #e0e0e0;
    text-align: center;
  }
  .back-home a {
    color: #267CB9;
    text-decoration: none;
    font-size: 15px;
  }
  .back-home a:hover {
    text-decoration: underline;
  }
</style>
